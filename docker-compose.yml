name: saga
services:
  postgres:
    image: postgres:16-alpine
    container_name: saga-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saga_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saga-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  booking-api:
    image: booking-api:dev
    container_name: booking-api-dev
    build:
      context: .
      dockerfile: ./src/Services/Booking.API/Dockerfile.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ENABLE_WATCH=false
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=BookingDb;Username=postgres;Password=postgres;Port=5432
    ports:
      - "5001:8080"
      - "5011:5011"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./src/Services/Booking.API:/src/Services/Booking.API
      - ./src/Common:/src/Common
    networks:
      - saga-network

  flight-api:
    image: flight-api:dev
    container_name: flight-api-dev
    build:
      context: .
      dockerfile: ./src/Services/Flight.API/Dockerfile.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ENABLE_WATCH=false
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=FlightDb;Username=postgres;Password=postgres;Port=5432
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      booking-api:
        condition: service_started
    volumes:
      - ./src/Services/Flight.API:/src/Services/Flight.API
      - ./src/Common:/src/Common
    networks:
      - saga-network

  hotel-api:
    image: hotel-api:dev
    container_name: hotel-api-dev
    build:
      context: .
      dockerfile: ./src/Services/Hotel.API/Dockerfile.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ENABLE_WATCH=false
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=HotelDb;Username=postgres;Password=postgres;Port=5432
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      flight-api:
        condition: service_started
    volumes:
      - ./src/Services/Hotel.API:/src/Services/Hotel.API
      - ./src/Common:/src/Common
    networks:
      - saga-network

  car-api:
    image: car-api:dev
    container_name: car-api-dev
    build:
      context: .
      dockerfile: ./src/Services/Car.API/Dockerfile.dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ENABLE_WATCH=false
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=CarDb;Username=postgres;Password=postgres;Port=5432
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      hotel-api:
        condition: service_started
    volumes:
      - ./src/Services/Car.API:/src/Services/Car.API
      - ./src/Common:/src/Common
    networks:
      - saga-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: saga-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - saga-network
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: saga-otel-collector
    command: [ "--config=/etc/otelcol-contrib/config.yaml" ]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - tempo
    networks:
      - saga-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: saga-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus-recording-rules.yml:/etc/prometheus/prometheus-recording-rules.yml:ro
      - ./observability/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
    ports:
      - "9090:9090"
    networks:
      - saga-network

  tempo:
    image: grafana/tempo:2.6.1
    container_name: saga-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "3200:3200"
    depends_on:
      - prometheus
    networks:
      - saga-network

  grafana:
    image: grafana/grafana:11.2.0
    container_name: saga-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./observability/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./observability/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    networks:
      - saga-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: saga-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - saga-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: saga-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - saga-network
    restart: unless-stopped

  dynatrace-oneagent:
    image: dynatrace/oneagent:latest
    container_name: saga-dynatrace-oneagent
    privileged: true
    environment:
      - DT_TENANT=${DT_TENANT}
      - DT_API_URL=${DT_API_URL}
      - DT_API_TOKEN=${DT_API_TOKEN}
      - ONEAGENT_INSTALLER_SCRIPT_URL=${ONEAGENT_INSTALLER_SCRIPT_URL}
      - DT_HOST_ID=${DT_HOST_ID:-saga-local-dev}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc
      - /sys:/host/sys
    networks:
      - saga-network
    restart: always

volumes:
  postgres_data:
  grafana_data:
  elasticsearch_data:


networks:
  saga-network:
    driver: bridge
