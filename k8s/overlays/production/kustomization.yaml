apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Reference the base kustomization
resources:
  - ../../base

namespace: saga-pattern

# Add production-specific resources
resources:
  - secrets.yaml
  - ../../secretproviderclass.yaml
  - ../../hpa.yaml
  - ../../network-policies.yaml

# Production uses Azure Container Registry images (no image override needed)
# Images are already set to sagapatternacr.azurecr.io/* in base manifests

# Production-specific patches
patches:
  # Increase replicas for production
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: booking-api
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: flight-api
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: hotel-api
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
    target:
      kind: Deployment
      name: car-api

labels:
  - includeSelectors: true
    pairs:
      environment: production
      deployment-type: production

commonAnnotations:
  managed-by: kustomize
  environment: production
