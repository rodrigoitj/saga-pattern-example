# Network Policies for saga-pattern namespace
# Implements zero-trust network security with explicit allow rules

---
# Default deny all ingress traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: saga-pattern
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# Allow ingress to booking-api from internet (LoadBalancer)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-booking-api-ingress
  namespace: saga-pattern
spec:
  podSelector:
    matchLabels:
      app: booking-api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector: {}  # Allow from any pod in the namespace
    ports:
    - protocol: TCP
      port: 8080

---
# Allow bookingAPI to communicate with RabbitMQ
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-booking-to-rabbitmq
  namespace: saga-pattern
spec:
  podSelector:
    matchLabels:
      app: booking-api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: rabbitmq
    ports:
    - protocol: TCP
      port: 5672

---
# Allow booking-api to communicate with PostgreSQL
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-booking-to-postgres
  namespace: saga-pattern
spec:
  podSelector:
    matchLabels:
      app: booking-api
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432

---
# Allow booking-api to communicate with OTEL Collector
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-booking-to-otel
  namespace: saga-pattern
spec:
