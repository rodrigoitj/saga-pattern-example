---
# Allow RabbitMQ ingress from services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rabbitmq-ingress
  namespace: saga-pattern
spec:
  podSelector:
    matchLabels:
      app: rabbitmq
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: booking-api
    - podSelector:
        matchLabels:
          app: flight-api
    - podSelector:
        matchLabels:
          app: hotel-api
    - podSelector:
        matchLabels:
          app: car-api
    ports:
    - protocol: TCP
      port: 5672

---
# Allow PostgreSQL ingress from services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: saga-pattern
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: booking-api
    - podSelector:
        matchLabels:
          app: flight-api
    - podSelector:
        matchLabels:
          app: hotel-api
    - podSelector:
